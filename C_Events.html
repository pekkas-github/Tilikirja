<script>

class C_Events {

  openPage () {

    const years        = model.years().getYears()  //this.years.getYears()
    const currentYear  = model.years().getCurrentYear()  //this.years.getCurrentYear()
    const eventsOfYear = model.events().getEventsOfYear(currentYear)  //this.events.getEventsOfYear(currentYear)

    view.eventList().render(this, eventsOfYear, years, currentYear)
  }

  updateContent () {

    const currentYear  = model.years().getCurrentYear()
    const eventsOfYear = model.events().getEventsOfYear(currentYear)

    view.eventList().update(this, eventsOfYear)
  }

  onAddNewEvent () {

    const event       = model.events().getNewEvent()
    const accounts    = model.events().getAccounts()
    const years       = model.years().getYears()
    const currentYear = model.years().getCurrentYear()

    event.fiscal_year = model.years().getDefaultYear()
    view.eventDetails().render(this, event, accounts, years)
  }
     
  onChangeYear (year) {
    
    model.years().setCurrentYear(year)
    
    this.updateContent()
  }
    
  async onExportEventsOnSheet (year) {

    frame.spinner.on()
    await model.exports().printYearlyEventsSheet(year)
    frame.spinner.off()
    frame.alerts.inform(`Vuoden ${year} tapahtumat talletettu taulukkoon.`, () => {})
  }

  onModifyEvent (id) {

    const event      = model.events().getEvent(id)
    const accounts   = model.events().getAccounts()
    const years      = model.years().getYears()

    view.eventDetails().render(this, event, accounts, years)
  }

  onOpenComment (id) {

    const event = model.events().getEvent(id)
    if (event.comment === '') { return }

    view.eventComment().render(event)
  }

  async onSaveEvent (event) {

    if (event.id === 0) {
      //insert
      frame.spinner.on()
      model.events().addEvent(event).then(() => {
        this.updateContent()
        frame.spinner.off()
      })
    } 
    else {
      //update
      model.events().updateEvent(event)
      this.updateContent()
    }
  }

  onToggleEventStatus (id) {

    model.events().toggleEventStatus(id)
    this.updateContent()
  }
}

</script>
