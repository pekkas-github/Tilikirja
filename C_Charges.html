<script>

class C_Charges {

  openPage () {

    const eventsToBeCharged = model.events().getEventsToBeCharged()
    const chargeHistory     = model.events().getChargeHistory()
    const currentPeriod     = model.events().getCurrentChargingPeriod()

    view.charges().render(this, eventsToBeCharged, currentPeriod, chargeHistory)
  }

  updateContent () {

    const eventsToBeCharged = model.events().getEventsToBeCharged()
    const chargeHistory     = model.events().getChargeHistory()
    const currentPeriod     = model.events().getCurrentChargingPeriod()

    view.charges().update(eventsToBeCharged, currentPeriod, chargeHistory)
  }

  onAckCharges (date) {

    model.events().ackCharges(date)
    this.updateContent()    
  }

  async onPrintChargingSheet () {

    frame.spinner.on()
    await model.exports().printChargingSheet()
    frame.spinner.off()
    frame.alerts.inform('Veloitustaulukko on päivitetty.', () => {})
  }
}
</script>
